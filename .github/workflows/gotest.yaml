name: golang

"on":
  push:
    tags:
      - "v*"
    branches:
      - "master"
      - "main"
  pull_request: {}

env:
  CGO_ENABLED: "0"
  GO111MODULE: "on"

jobs:
  test:
    name: "test"
    strategy:
      matrix:
        go-version: ["1.14.x", "1.15.x"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go-version }}
      - uses: actions/checkout@v2
      - name: Test
        run: "go test ./..."
  build:
    name: "build"
    strategy:
      matrix:
        go-version: ["1.14.x", "1.15.x"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-go@v2
        with:
          go-version: ${{ matrix.go-version }}
      - uses: actions/cache@v2
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - uses: actions/checkout@v2
      - name: Build
        run: "go build ./..."
